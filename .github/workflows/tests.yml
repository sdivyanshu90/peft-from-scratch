name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: lint + types (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (CPU torch + dev)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,hf]"
      - name: Ruff format check
        run: ruff format --check peft_lib tests
      - name: Ruff lint
        run: ruff check peft_lib tests
      - name: Mypy (strict)
        run: mypy peft_lib

  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (CPU torch + dev + hf)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,hf]"
      - name: Run test suite (skip gpu/quant)
        env:
          CUDA_VISIBLE_DEVICES: ""
          TOKENIZERS_PARALLELISM: "false"
        run: |
          pytest -m "not gpu and not quant" \
            --cov=peft_lib --cov-report=term-missing --cov-fail-under=90
      - name: Doctests
        run: pytest --doctest-modules peft_lib -q
